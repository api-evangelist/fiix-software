aid: fiix-software
name: Fiix Software
description: >-
  Fiix (by Rockwell Automation) is a cloud-based CMMS (Computerized Maintenance
  Management System) platform for maintenance and reliability teams in manufacturing,
  facilities, and utilities. The Fiix API provides programmatic access to assets, work
  orders, purchase orders, parts, users, and maintenance data through custom client
  libraries, with integration support for ERP and industrial automation systems including
  FactoryTalk Optix.
type: Index
url: https://raw.githubusercontent.com/api-evangelist/fiix-software/refs/heads/main/apis.yml
