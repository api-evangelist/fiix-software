apis:
  - aid: fiix-software:fiix-cmms-api
    name: Fiix CMMS API
    description: >-
      The Fiix CMMS API provides programmatic access to maintenance management data
      including assets, work orders, purchase orders, parts inventory, users, and
      maintenance schedules. Supports CRUD operations on all core objects via custom
      client libraries for Java and other languages. Available on Enterprise plans
      with a rate limit of 1,000 API calls per day per user license. Integrates with
      Rockwell Automation FactoryTalk Optix via the Fiix CMMS library.
    humanURL: https://fiixlabs.github.io/api-documentation/
